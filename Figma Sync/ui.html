<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 12px; margin: 0; background: #f5f5f5; }
    textarea { width: 100%; height: 180px; font-family: monospace; font-size: 11px; box-sizing: border-box; resize: none; border: 1px solid #e0e0e0; padding: 8px; }
    button { width: 100%; margin-top: 10px; background: #18a0fb; color: white; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    button:hover { background: #0d8de3; }
    .error-log { color: #f24822; font-size: 11px; margin-top: 5px; font-weight: bold; display: none; }
  </style>
</head>
<body>
  <textarea id="payload" placeholder="Pega el JSON o el Markdown de VANTAGE aquí..."></textarea>
  <div id="errorDisplay" class="error-log"></div>
  <button id="sync">Inyectar a Nodos Nativos</button>

  <script>
    document.getElementById('sync').onclick = () => {
      const rawText = document.getElementById('payload').value;
      const errorDisplay = document.getElementById('errorDisplay');
      errorDisplay.style.display = 'none';
      errorDisplay.innerText = '';
      
      if (rawText.includes('figma_text_id')) {
        try {
          const parsedData = {};
          const duplicateIds = [];
          const blockRegex = /######\s+\[figma_text_id\]\(([^)]+)\)\s*([\s\S]*?)(?=######\s+\[figma_text_id\]|\s*$)/g;
          let match;

          while ((match = blockRegex.exec(rawText)) !== null) {
            const nodeId = match[1].trim();
            let content = match[2].trim();

            if (nodeId in parsedData) {
              duplicateIds.push(nodeId);
            }

            // Sanitización de entidades HTML y Markdown secundario
            content = content
              .replace(/&amp;/g, '&')
              .replace(/&lt;/g, '<')
              .replace(/&gt;/g, '>')
              .replace(/_([^_]+)_/g, '$1') 
              .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') 
              .replace(/\\/g, ''); 

            // Motor de extracción de rangos dinámicos para negritas (**)
            let cleanContent = "";
            let boldRanges = [];
            let i = 0;
            let isBold = false;
            let boldStart = 0;

            while (i < content.length) {
              if (content.substr(i, 2) === "**") {
                if (!isBold) {
                  boldStart = cleanContent.length;
                  isBold = true;
                } else {
                  boldRanges.push({ start: boldStart, end: cleanContent.length });
                  isBold = false;
                }
                i += 2;
              } else {
                cleanContent += content[i];
                i++;
              }
            }

            parsedData[nodeId] = {
              text: cleanContent,
              boldRanges: boldRanges
            };
          }

          if (duplicateIds.length > 0) {
            const uniqueDupes = [...new Set(duplicateIds)];
            errorDisplay.innerText = `Fricción Estructural: IDs duplicados: ${uniqueDupes.join(', ')}`;
            errorDisplay.style.display = 'block';
            return;
          }

          if (Object.keys(parsedData).length === 0) {
            alert('No se detectaron bloques válidos de figma_text_id.');
            return;
          }

          parent.postMessage({ pluginMessage: { type: 'execute-sync', data: parsedData } }, '*');
        } catch (e) {
          alert('Error crítico en el motor analítico de Markdown.');
        }
      } else {
        try {
          const parsed = JSON.parse(rawText);
          const normalizedData = {};
          for (const [k, v] of Object.entries(parsed)) {
            normalizedData[k] = typeof v === 'string' ? { text: v, boldRanges: [] } : v;
          }
          parent.postMessage({ pluginMessage: { type: 'execute-sync', data: normalizedData } }, '*');
        } catch (e) {
          alert('Sintaxis inválida. Verifica el árbol de datos.');
        }
      }
    };
  </script>
</body>
</html>
